version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/var/www/html/data
      - ./uploads:/var/www/html/uploads
    environment:
      - SQLITE_PATH=/var/www/html/data/database.sqlite
    restart: unless-stopped

